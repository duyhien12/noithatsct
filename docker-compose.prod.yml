services:
  postgres:
    image: postgres:16-alpine
    container_name: noithatsct-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: noithatsct
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - noithatsct-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: noithatsct-app:latest
    container_name: noithatsct-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/noithatsct?schema=public
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://admin.kientrucsct.com}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - ZALO_APP_ID=${ZALO_APP_ID}
      - ZALO_APP_SECRET=${ZALO_APP_SECRET}
      - ZALO_OA_ACCESS_TOKEN=${ZALO_OA_ACCESS_TOKEN}
      - ZALO_OA_REFRESH_TOKEN=${ZALO_OA_REFRESH_TOKEN}
      - CRON_SECRET=${CRON_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-https://admin.kientrucsct.com}
      - UPLOAD_SERVICE_KEY=${UPLOAD_SERVICE_KEY}
      - NODE_ENV=production
      - UPLOAD_DIR=/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/public/uploads
    networks:
      - noithatsct-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000').then(r => process.exit(r.ok || r.status===307 ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  uploads_data:

networks:
  noithatsct-network:
    driver: bridge
