name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    labels: [noithatsct]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create environment file
        run: |
          cat > .env <<EOF
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL=https://admin.kientrucsct.com
          EOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Ensure PostgreSQL is running
        run: |
          docker compose -p noithatsct -f docker-compose.prod.yml up -d postgres
          sleep 5

      - name: Install dependencies
        run: npm ci

      - name: Sync database schema
        env:
          DATABASE_URL: postgresql://postgres:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/noithatsct?schema=public
        run: |
          npx prisma generate
          npx prisma db push --accept-data-loss

      - name: Build and deploy app
        run: |
          docker compose -p noithatsct -f docker-compose.prod.yml build app
          docker compose -p noithatsct -f docker-compose.prod.yml up -d

          echo "==> Cleaning up old images..."
          docker image prune -f

          echo "==> Waiting for health check..."
          sleep 10

          echo "==> Container status:"
          docker ps --filter "name=noithatsct" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
