name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd ${{ secrets.APP_DIR }}
            git pull origin main

            # Sync database schema (đọc credentials từ .env sẵn có trên VPS)
            set -o allexport; source .env; set +o allexport
            export DATABASE_URL="postgresql://postgres:${POSTGRES_PASSWORD}@localhost:5432/noithatsct?schema=public"
            npm ci --quiet
            npx prisma generate
            npx prisma db push --accept-data-loss

            # Rebuild Docker image và restart
            docker compose -p noithatsct -f docker-compose.prod.yml build app
            docker compose -p noithatsct -f docker-compose.prod.yml up -d
            docker image prune -f

            echo "Deploy hoàn thành"
            docker ps --filter "name=noithatsct" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
